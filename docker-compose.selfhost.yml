services:
  app:
    image: ydeng11/minance:nightly
    restart: unless-stopped
    env_file:
      - .env.selfhost
    extra_hosts:
      - "api:127.0.0.1"
    environment:
      NODE_ENV: production
      PORT: 3000
      MINANCE_NEXT_DIST_DIR: .next
      MINANCE_API_ORIGIN: http://127.0.0.1:3001
      MINANCE_INTERNAL_API_PORT: 3001
      MINANCE_STORE_BACKEND: sqlite
      MINANCE_DATA_FILE: /var/lib/minance/store.json
      MINANCE_SQLITE_FILE: /var/lib/minance/production-minance.sqlite
      MINANCE_SQLITE_SCHEMA_FILE: /app/services/api/sql/schema.sql
      MINANCE_SQLITE_AUTO_INIT: "true"
      MINANCE_SEED_TEST_ACCOUNT: "false"
    volumes:
      - ${MINANCE_RUNTIME_DATA_SOURCE:-minance_data}:/var/lib/minance
    ports:
      - "${MINANCE_WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/readyz').then((r)=>process.exit(r.status === 200 ? 0 : 1)).catch(()=>process.exit(1))\""
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  minance_data:
    name: minance_data
