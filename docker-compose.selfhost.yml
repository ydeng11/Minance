services:
  api:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.api
    image: minance-next-api:local
    restart: unless-stopped
    env_file:
      - .env.selfhost
    environment:
      NODE_ENV: production
      PORT: 3001
      MINANCE_STORE_BACKEND: sqlite
      MINANCE_DATA_FILE: /var/lib/minance/store.json
      MINANCE_SQLITE_FILE: /var/lib/minance/minance.sqlite
      MINANCE_SQLITE_SCHEMA_FILE: /app/services/api/sql/schema.sql
      MINANCE_SQLITE_AUTO_INIT: "true"
      MINANCE_SEED_TEST_ACCOUNT: "false"
    volumes:
      - minance_data:/var/lib/minance
    ports:
      - "${MINANCE_API_PORT:-3001}:3001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/v1/system/storage').then((r)=>process.exit(r.status < 500 ? 0 : 1)).catch(()=>process.exit(1))\""
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.web
      args:
        MINANCE_API_ORIGIN: http://api:3001
    image: minance-next-web:local
    restart: unless-stopped
    env_file:
      - .env.selfhost
    environment:
      NODE_ENV: production
      MINANCE_API_ORIGIN: http://api:3001
      MINANCE_NEXT_DIST_DIR: .next
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${MINANCE_WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.status < 500 ? 0 : 1)).catch(()=>process.exit(1))\""
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  minance_data:
    name: minance_data
